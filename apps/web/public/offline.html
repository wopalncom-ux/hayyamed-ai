<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — Hayyamed AI</title>
<style>
  body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;
    background:#07090f;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;text-align:center;padding:24px}
  .logo{font-size:26px;font-weight:900;letter-spacing:-.5px;margin-bottom:18px}
  .logo span{color:#00e5a0}
  .icon{font-size:48px;margin-bottom:14px}
  h1{font-size:20px;font-weight:800;margin:0 0 8px}
  p{color:#7a8fa6;font-size:14px;max-width:340px;line-height:1.6}
  button{margin-top:22px;padding:11px 26px;background:#00e5a0;border:none;border-radius:8px;color:#07090f;font-weight:800;font-size:14px;cursor:pointer}
</style>
</head>
<body>
  <div class="logo">Hayya<span>med</span> AI</div>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>No internet connection. Your data is safe — reconnect to continue working. Any actions you queued will sync automatically.</p>
  <button onclick="location.reload()">Try again</button>
</body>
</html>
