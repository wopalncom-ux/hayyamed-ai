steps:
  # ─── Authenticate Docker to Artifact Registry ───────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: ['auth', 'configure-docker', 'me-central1-docker.pkg.dev', '--quiet']
    volumes:
    - name: docker-config
      path: /root/.docker
    id: auth-docker

  # ─── Build API ──────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'me-central1-docker.pkg.dev/$PROJECT_ID/hayyamed-ai/api:latest'
      - '-f'
      - 'apps/api/Dockerfile'
      - 'apps/api'
    waitFor: [auth-docker]
    id: build-api

  # ─── Build Web ──────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'me-central1-docker.pkg.dev/$PROJECT_ID/hayyamed-ai/web:latest'
      - '-f'
      - 'apps/web/Dockerfile'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=https://api.hayyaai.com'
      - '--build-arg'
      - 'NEXT_PUBLIC_WS_URL=wss://api.hayyaai.com'
      - 'apps/web'
    waitFor: [auth-docker]
    id: build-web

  # ─── Push API ───────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: [push, 'me-central1-docker.pkg.dev/$PROJECT_ID/hayyamed-ai/api', '--all-tags']
    volumes:
    - name: docker-config
      path: /root/.docker
    waitFor: [build-api]
    id: push-api

  # ─── Push Web ───────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: [push, 'me-central1-docker.pkg.dev/$PROJECT_ID/hayyamed-ai/web', '--all-tags']
    volumes:
    - name: docker-config
      path: /root/.docker
    waitFor: [build-web]
    id: push-web

  # ─── Deploy API to Cloud Run ─────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - hayyamed-api
      - '--image=me-central1-docker.pkg.dev/$PROJECT_ID/hayyamed-ai/api:latest'
      - '--region=me-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=4000'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--concurrency=80'
      - '--timeout=60'
      - '--set-env-vars=NODE_ENV=production,VAPID_PUBLIC_KEY=BMXwepZqm65KQ1EWLZbQ7xJCvOK-e2g8SxpMzvFVpPOwE3-D_IlbUDV31Hrz9M-_gSJ4swDjiY3YNbNhRz-h3HE,VAPID_SUBJECT=mailto:support@hayyaai.com'
      - '--add-cloudsql-instances=hayyamed-ai-crm:me-central1:hayyamed-db'
      - >-
        --update-secrets=DATABASE_URL=hayyamed-database-url:latest,JWT_SECRET=hayyamed-jwt-secret:latest,JWT_REFRESH_SECRET=hayyamed-jwt-refresh-secret:latest,OPENAI_API_KEY=hayyamed-openai-key:latest,ANTHROPIC_API_KEY=hayyamed-anthropic-key:latest,WHATSAPP_ACCESS_TOKEN=hayyamed-whatsapp-token:latest,WHATSAPP_WEBHOOK_TOKEN=hayyamed-whatsapp-webhook-token:latest,META_APP_SECRET=hayyamed-meta-app-secret:latest,POSTMARK_SERVER_TOKEN=hayyamed-postmark-token:latest,FRONTEND_URL=hayyamed-frontend-url:latest,EMAIL_FROM=hayyamed-email-from:latest,VAPID_PRIVATE_KEY=hayyamed-vapid-private:latest
    waitFor: [push-api]
    id: deploy-api

  # ─── Deploy Web to Cloud Run ─────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - hayyamed-web
      - '--image=me-central1-docker.pkg.dev/$PROJECT_ID/hayyamed-ai/web:latest'
      - '--region=me-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--concurrency=80'
      - '--timeout=60'
      - '--set-env-vars=NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1'
      - '--update-secrets=NEXT_PUBLIC_API_URL=hayyamed-api-url:latest,NEXTAUTH_SECRET=hayyamed-nextauth-secret:latest'
    waitFor: [push-web]
    id: deploy-web

images:
  - 'me-central1-docker.pkg.dev/$PROJECT_ID/hayyamed-ai/api:latest'
  - 'me-central1-docker.pkg.dev/$PROJECT_ID/hayyamed-ai/web:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: LEGACY

# PERMANENT RULE: me-central1 (Doha, Qatar) ONLY — no global/us/eu regions
