steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - me-central1-docker.pkg.dev/$PROJECT_ID/hayyamed-crm/web:$COMMIT_SHA
      - -f
      - apps/web/Dockerfile
      - --build-arg
      - NEXT_PUBLIC_API_URL=https://api.hayyamedai.com/api/v1
      - --build-arg
      - NEXT_PUBLIC_WS_URL=wss://api.hayyamedai.com
      - apps/web

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - me-central1-docker.pkg.dev/$PROJECT_ID/hayyamed-crm/web:$COMMIT_SHA

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - hayyamed-crm-web
      - --image=me-central1-docker.pkg.dev/$PROJECT_ID/hayyamed-crm/web:$COMMIT_SHA
      - --region=me-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --set-env-vars=NODE_ENV=production,NEXT_PUBLIC_API_URL=https://api.hayyamedai.com/api/v1,NEXT_PUBLIC_WS_URL=wss://api.hayyamedai.com,NEXTAUTH_URL=https://app.hayyamedai.com
      - --set-secrets=NEXTAUTH_SECRET=HAYYAMED_CRM_NEXTAUTH_SECRET:latest,OPENAI_API_KEY=HAYYAMED_CRM_OPENAI_API_KEY:latest

images:
  - me-central1-docker.pkg.dev/$PROJECT_ID/hayyamed-crm/web:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
