# ============================================
# HAYYAMED AI — DOCKER COMPOSE (Production)
# ============================================

version: '3.9'

services:

  # ─── FRONTEND (Next.js) ──────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: hayyamed-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - hayyamed-net

  # ─── BACKEND (NestJS) ────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: hayyamed-api
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_WEBHOOK_TOKEN=${WHATSAPP_WEBHOOK_TOKEN}
      - META_APP_ID=${META_APP_ID}
      - META_APP_SECRET=${META_APP_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - hayyamed-net

  # ─── POSTGRESQL (pgvector-enabled) ──────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hayyamed-postgres
    environment:
      - POSTGRES_DB=hayyamed
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - hayyamed-net

  # ─── REDIS ───────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hayyamed-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - hayyamed-net

  # ─── NGINX (Reverse Proxy) ───────────────
  nginx:
    image: nginx:alpine
    container_name: hayyamed-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/ssl/hayyamed:ro
    depends_on:
      - web
      - api
    restart: unless-stopped
    networks:
      - hayyamed-net

volumes:
  postgres-data:
  redis-data:

networks:
  hayyamed-net:
    driver: bridge
